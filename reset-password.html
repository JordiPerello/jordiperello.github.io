<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Restablece la contraseña de tu cuenta TourAI desde un enlace seguro enviado por correo.">
    <title>Restablecer contraseña - TourAI</title>
    <link rel="icon" type="image/png" href="img/tourai_logo.png">
    <link rel="stylesheet" href="css/site.css">
    <link rel="stylesheet" href="css/legal-layout.css">
    <script src="js/cookie-consent-init.js"></script>
</head>
<body class="site-legal-page">
    <header>
        <h1>Restablecer contraseña</h1>
        <p>Elige una nueva contraseña para tu cuenta TourAI.</p>
    </header>

    <div class="main-layout">
        <main class="container">
            <form id="resetPasswordForm" class="contact-form" novalidate>
                <label for="newPassword">Nueva contraseña</label>
                <input id="newPassword" type="password" minlength="6" required autocomplete="new-password">

                <label for="confirmPassword">Confirmar contraseña</label>
                <input id="confirmPassword" type="password" minlength="6" required autocomplete="new-password">

                <button type="submit" class="btn-primary">Guardar contraseña</button>
            </form>

            <p id="resetStatus" class="form-status" role="status" aria-live="polite"></p>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="js/site-config.js"></script>
    <script src="js/site-config.secrets.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
