<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Restablece la contraseña de tu cuenta TourAI desde un enlace seguro enviado por correo.">
    <link rel="canonical" href="https://tourai.es/reset-password.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TourAI">
    <meta property="og:title" content="Restablecer contraseña - TourAI">
    <meta property="og:description" content="Elige una nueva contraseña para tu cuenta TourAI.">
    <meta property="og:url" content="https://tourai.es/reset-password.html">
    <meta property="og:image" content="https://tourai.es/img/tourai_logo.png">
    <title>Restablecer contraseña - TourAI</title>
    <link rel="icon" type="image/png" href="img/tourai_logo.png">
    <link rel="apple-touch-icon" href="img/tourai_logo.png">
    <link rel="stylesheet" href="css/site.css">
    <link rel="stylesheet" href="css/legal-layout.css">
    <link rel="stylesheet" href="css/auth-action.css">
    <script src="js/cookie-consent-init.js"></script>
</head>
<body class="site-legal-page auth-action-page">

    <nav>
        <div class="nav-logo-container">
            <a href="index.html"><img src="img/tourai_logo_inline.png" alt="TourAI"></a>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">La App</a>
            <a href="contact.html">Contacto</a>
        </div>
    </nav>

    <section class="auth-action-hero">
        <img class="auth-action-hero__logo" src="img/tourai_logo.png" alt="TourAI">
        <p class="auth-action-hero__brand">TourAI</p>
        <h1 class="auth-action-hero__title">Restablecer contraseña</h1>
        <p class="auth-action-hero__subtitle">Elige una nueva contraseña para volver a explorar con tu guía turística inteligente.</p>
    </section>

    <div class="main-layout">
        <main class="container auth-action-main">
            <div class="auth-action-card" id="resetCard">
                <form id="resetPasswordForm" class="contact-form auth-action-form" novalidate>
                    <label for="newPassword">Nueva contraseña</label>
                    <input id="newPassword" type="password" minlength="6" required autocomplete="new-password" placeholder="Mínimo 6 caracteres">

                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input id="confirmPassword" type="password" minlength="6" required autocomplete="new-password" placeholder="Repite la contraseña">

                    <button type="submit" class="btn-primary auth-action-submit">Guardar contraseña</button>
                </form>

                <div id="resetSuccess" class="auth-action-success" hidden>
                    <div class="auth-action-success__icon" aria-hidden="true">✓</div>
                    <h2>Contraseña actualizada</h2>
                    <p>Ya puedes volver a la app TourAI e iniciar sesión con tu nueva contraseña.</p>
                    <a class="btn-primary auth-action-submit" href="index.html">Ir a TourAI</a>
                </div>

                <p id="resetStatus" class="form-status auth-action-status" role="status" aria-live="polite"></p>
            </div>
        </main>
    </div>

    <footer class="auth-action-footer">
        <p>© TourAI · <a href="mailto:info@tourai.es">info@tourai.es</a></p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="js/site-config.js"></script>
    <script src="js/site-config.secrets.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
