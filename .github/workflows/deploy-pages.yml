name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject site secrets
        env:
          SITE_CONFIG_SECRETS: ${{ secrets.TOURAI_SITE_CONFIG_SECRETS }}
        run: |
          if [ -z "$SITE_CONFIG_SECRETS" ]; then
            echo "Missing repository secret TOURAI_SITE_CONFIG_SECRETS"
            exit 1
          fi
          printf '%s\n' "$SITE_CONFIG_SECRETS" > js/site-config.secrets.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
