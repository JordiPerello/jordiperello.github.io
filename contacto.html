<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - TourAI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f9; text-align: center; }
        header { background: #0A2A43; color: white; padding: 40px; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
        button { background: #0d3b5e; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>Contacto y Soporte TourAI</h1></header>
    <div class="form-container">
        <h2>¿Tienes alguna duda técnica?</h2>
        <p>Nuestro equipo de soporte para la aplicación y la web está disponible 24/7.</p>
        <form>
            <input type="text" placeholder="Tu Nombre Completo">
            <input type="email" placeholder="Correo Electrónico">
            <textarea placeholder="¿En qué podemos ayudarte?" rows="5"></textarea>
            <button type="button">ENVIAR CONSULTA</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.8em; color: #888;">Ubicación: Hub Tecnológico de Barcelona, España.<br>Email: info@jordiperello.github.io</p>
    </div>
    <p><a href="index.html">Volver al Inicio</a></p>
</body>
</html>
